name: navalert
description: "NavAlert: adaptive destination alarm, route/fare commute guide, and emergency safety system for Metro Manila PUV commuters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State / MVVM
  provider: ^6.1.2

  # Local storage — SQLite with SQLCipher AES-256 encryption (paper: Development Tools).
  sqflite_sqlcipher: ^3.1.0+1
  flutter_secure_storage: ^9.2.2
  path: ^1.9.0
  path_provider: ^2.1.4

  # Networking (Nominatim geocoding)
  http: ^1.2.2

  # Maps (OpenStreetMap tiles)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location / GPS speed
  geolocator: ^13.0.1

  # Google Maps intent / external launch
  url_launcher: ^6.3.0

  # Permissions
  permission_handler: ^11.3.1

  # IDs
  uuid: ^4.5.1

  # Alarm feedback
  vibration: ^2.0.0
  audioplayers: ^6.1.0
  record: ^5.1.2
  flutter_local_notifications: ^17.2.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
